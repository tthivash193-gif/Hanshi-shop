<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Review Order</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f1f3f6;
}

a{
text-decoration:none;
color:black;
}

/* HEADER */

.header{
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:sticky;
top:0;
}

.title{
font-size:18px;
font-weight:bold;
}

/* ADDRESS */

.address{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.address h3{
margin-bottom:10px;
}

.change{
color:#9c27b0;
font-size:14px;
margin-top:8px;
display:inline-block;
}

/* PRODUCT */

.product{
background:white;
margin:10px;
padding:12px;
display:flex;
gap:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.product img{
width:80px;
border-radius:6px;
}

.info{
flex:1;
}

.price{
font-weight:bold;
margin-top:6px;
}

/* PRICE SUMMARY */

.summary{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-weight:bold;
font-size:18px;
}

/* CONTINUE BUTTON */

.place{
position:fixed;
bottom:0;
width:100%;
background:#9c27b0;
color:white;
text-align:center;
padding:15px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.space{
height:70px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<a href="cart.html">←</a>

<div class="title">
Review Order
</div>

<a href="profile.html">👤</a>

</div>

<!-- ADDRESS -->

<div class="address">

<h3>Delivery Address</h3>

<p>

Thivash<br>
12, Main Street<br>
Chennai, Tamil Nadu<br>
600001<br>
Mobile: 9876543210

</p>

<a href="address.html" class="change">
Change Address →
</a>

</div>

<!-- PRODUCT -->

<div class="product">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

<div class="info">

<p>Supercar Wall Poster</p>

<div class="price">
₹258
</div>

<p>Qty: 1</p>

</div>

</div>

<!-- PRICE DETAILS -->

<div class="summary">

<h3>Price Details</h3>

<div class="row">

<span>Item Total</span>

<span>₹258</span>

</div>

<div class="row">

<span>Delivery Fee</span>

<span>₹40</span>

</div>

<div class="row total">

<span>Total Amount</span>

<span>₹298</span>

</div>

</div>

<div class="space"></div>

<!-- CONTINUE -->

<div class="place" onclick="goPayment()">

Continue to Payment

</div>

<script>

function goPayment(){

window.location="payment.html"

}

</script>

</body>

</html>
