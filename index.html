<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:#e60023;
color:white;
padding:12px;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar a{
color:white;
text-decoration:none;
font-size:20px;
}

.search{
background:white;
padding:10px;
border-radius:20px;
margin-top:10px;
}

.search input{
border:none;
outline:none;
width:100%;
font-size:16px;
}

/* BANNER */

.banner{
margin:10px;
}

.banner img{
width:100%;
border-radius:10px;
}

/* CATEGORIES */

.categories{
display:flex;
overflow:auto;
padding:10px;
gap:15px;
}

.cat{
text-align:center;
font-size:12px;
}

.cat img{
width:70px;
height:70px;
border-radius:50%;
}

/* SALE */

.sale{
background:gold;
padding:10px;
margin:10px;
border-radius:10px;
font-weight:bold;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

.name{
font-size:14px;
margin-top:6px;
}

.price{
color:green;
font-weight:bold;
}

/* BOTTOM MENU */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

.bottom a{
text-decoration:none;
color:black;
font-size:14px;
text-align:center;
}

.space{
height:70px;
}

</style>

</head>

<body>

<header>

<!-- CATEGORIES -->

Sale ends in

<script>

/* SEARCH */

function searchProduct(){

let input=document
.getElementById("searchBox")
.value.toLowerCase()

let cards=document
.querySelectorAll(".card")

cards.forEach(function(card){

let name=card
.querySelector(".name")
.innerText.toLowerCase()

if(name.includes(input)){

card.style.display="block"

}else{

card.style.display="none"

}

})

}

/* SALE TIMER */

let time=3*3600+41*60+37

setInterval(function(){

let h=Math.floor(time/3600)
let m=Math.floor((time%3600)/60)
let s=time%60

document.getElementById("timer").innerHTML=
h+"h : "+m+"m : "+s+"s"

time--

if(time<0){
time=0
}

},1000)

</script>

</body>
