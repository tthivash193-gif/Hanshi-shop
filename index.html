<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Meesho Login</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:280px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#9c27b0;
color:white;
font-weight:bold;
cursor:pointer;
}

.switch{
margin-top:10px;
font-size:14px;
color:#555;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="showSignup()">
New user? Signup
</div>

</div>

<script>

let mode="login"

function showSignup(){

mode="signup"

document.getElementById("title").innerText="Signup"

document.querySelector("button").innerText="Signup"

document.querySelector(".switch").innerText="Already have account? Login"

document.querySelector(".switch").onclick=showLogin

}

function showLogin(){

mode="login"

document.getElementById("title").innerText="Login"

document.querySelector("button").innerText="Login"

document.querySelector(".switch").innerText="New user? Signup"

document.querySelector(".switch").onclick=showSignup

}

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

if(mode==="signup"){

localStorage.setItem("userEmail",email)
localStorage.setItem("userPass",pass)

alert("Signup Success! Now Login")

showLogin()

return
}

let savedEmail=localStorage.getItem("userEmail")
let savedPass=localStorage.getItem("userPass")

if(email===savedEmail && pass===savedPass){

window.location="home.html"

}else{

alert("Wrong Login")

}

}

</script>

</body>
</html>
