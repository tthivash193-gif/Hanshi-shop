<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mini Meesho</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

/* HEADER */

.header{

background:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);

}

/* SEARCH */

.search{

flex:1;

}

.search input{

width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ddd;

}

/* ICONS */

.icons{

display:flex;
gap:10px;
font-size:20px;

}

.icons a{

text-decoration:none;

}

/* PRODUCTS */

.products{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;

}

.product{

background:white;
padding:10px;
border-radius:8px;
text-align:center;

}

.product img{

width:100%;
border-radius:6px;

}

.price{

font-weight:bold;
margin-top:5px;

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="search">

<input id="search" placeholder="Search products">

</div>

<div class="icons">

<a href="wishlist.html">❤️</a>

<a href="cart.html">🛒</a>

<a href="orders.html">📦</a>

<a href="profile.html">👤</a>

</div>

</div>

<!-- PRODUCTS -->

<div class="products" id="products">

<a href="product.html">

<div class="product">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

<p>Supercar Poster</p>

<div class="price">₹258</div>

</div>

</a>

<a href="product.html">

<div class="product">

<img src="https://i.imgur.com/9N5QZQx.jpeg">

<p>Photo Frame</p>

<div class="price">₹199</div>

</div>

</a>

<a href="product.html">

<div class="product">

<img src="https://i.imgur.com/vvL2q5v.jpeg">

<p>Wall Shelf</p>

<div class="price">₹499</div>

</div>

</a>

<a href="product.html">

<div class="product">

<img src="https://i.imgur.com/1q9Z1Zm.jpeg">

<p>LED Light</p>

<div class="price">₹349</div>

</div>

</a>

</div>

<script>

/* SEARCH FILTER */

let input = document.getElementById("search")

input.addEventListener("keyup", function(){

let filter = input.value.toLowerCase()

let products = document.querySelectorAll(".product")

products.forEach(function(p){

let text = p.innerText.toLowerCase()

if(text.includes(filter)){
p.style.display="block"
}else{
p.style.display="none"
}

})

})

</script>

</body>

</html>
