<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Logout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* card */

.box{
background:white;
padding:40px 30px;
border-radius:12px;
text-align:center;
width:300px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

/* icon */

.icon{
font-size:50px;
margin-bottom:15px;
}

/* text */

h2{
margin-bottom:10px;
}

p{
color:gray;
font-size:14px;
margin-bottom:20px;
}

/* buttons */

.btn{
display:block;
text-decoration:none;
padding:12px;
border-radius:25px;
margin-top:10px;
font-size:14px;
}

/* login button */

.login{
background:#9c27b0;
color:white;
}

/* home button */

.home{
background:#eee;
color:black;
}

</style>

</head>

<body>

<div class="box">

<div class="icon">👋</div>

<h2>You Logged Out</h2>

<p>Your account has been logged out successfully</p>

<a href="index.html" class="btn login">
Login Again
</a>

<a href="home.html" class="btn home">
Go to Home
</a>

</div>

</body>

</html>
