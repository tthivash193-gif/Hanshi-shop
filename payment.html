<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f1f3f6;
}

a{
text-decoration:none;
color:black;
}

/* HEADER */

.header{
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:sticky;
top:0;
}

.title{
font-size:18px;
font-weight:bold;
}

/* PAYMENT BOX */

.pay-box{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.option{
display:flex;
align-items:center;
gap:10px;
margin:15px 0;
font-size:16px;
}

/* PLACE ORDER */

.place{
position:fixed;
bottom:0;
width:100%;
background:#9c27b0;
color:white;
text-align:center;
padding:15px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.space{
height:70px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<a href="review.html">←</a>

<div class="title">
Select Payment
</div>

<a href="profile.html">👤</a>

</div>

<!-- PAYMENT OPTIONS -->

<div class="pay-box">

<h3>Payment Methods</h3>

<label class="option">
<input type="radio" name="pay" value="cod">
Cash on Delivery
</label>

<label class="option">
<input type="radio" name="pay" value="upi">
UPI / Google Pay / PhonePe
</label>

<label class="option">
<input type="radio" name="pay" value="card">
Credit / Debit Card
</label>

<label class="option">
<input type="radio" name="pay" value="netbank">
Net Banking
</label>

</div>

<div class="space"></div>

<!-- PLACE ORDER -->

<div class="place" onclick="payNow()">

Place Order

</div>

<script>

function payNow(){

let method=document.querySelector('input[name="pay"]:checked')

if(!method){

alert("Please select payment method")

return

}

let value=method.value

/* COD */

if(value=="cod"){

window.location="success.html"

}

/* UPI OPEN */

if(value=="upi"){

window.location="upi://pay?pa=demo@upi&pn=MiniMeesho&am=298&cu=INR"

}

/* CARD DEMO */

if(value=="card"){

alert("Card payment coming soon")

window.location="success.html"

}

/* NETBANK DEMO */

if(value=="netbank"){

alert("Net Banking payment")

window.location="success.html"

}

}

</script>

</body>

</html>
