<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Address</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

a{
text-decoration:none;
color:black;
}

/* HEADER */

.header{
background:white;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
font-size:18px;
font-weight:bold;
}

/* FORM */

.form{
background:white;
margin:12px;
padding:15px;
border-radius:10px;
}

.form input,
.form textarea{

width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;

}

/* BUTTON */

.save{

background:#9c27b0;
color:white;
text-align:center;
padding:12px;
margin:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;

}

/* SAVED */

.saved{

background:white;
margin:12px;
padding:15px;
border-radius:10px;

}

</style>

</head>

<body>

<div class="header">

<a href="review.html">←</a>

<div class="title">
My Address
</div>

<a href="profile.html">👤</a>

</div>

<!-- FORM -->

<div class="form">

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Mobile Number">

<textarea id="addr" placeholder="Full Address"></textarea>

<input id="city" placeholder="City">

<input id="pin" placeholder="Pincode">

</div>

<div class="save" onclick="saveAddress()">
Save Address
</div>

<!-- SAVED ADDRESS -->

<div class="saved" id="savedBox" style="display:none">

<h3>Saved Address</h3>

<p id="showAddress"></p>

</div>

<script>

function saveAddress(){

let name = document.getElementById("name").value
let phone = document.getElementById("phone").value
let addr = document.getElementById("addr").value
let city = document.getElementById("city").value
let pin = document.getElementById("pin").value

let full = name+"<br>"+phone+"<br>"+addr+"<br>"+city+" - "+pin

document.getElementById("savedBox").style.display="block"
document.getElementById("showAddress").innerHTML = full

}

</script>

</body>

</html>
