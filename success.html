<!DOCTYPE html>
<html>

<head>

}

.icon{

h1{

margin-bottom:8px;
}

p{
color:#555;
font-size:14px;
}

.btn{
display:block;
margin-top:15px;
padding:12px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.home{
background:#9c27b0;
color:white;
}

.orders{
background:#eee;
color:black;
}

</style>

</head>

<body>

<div class="box">

<div class="icon">
🎉
</div>

<a href="home.html" class="btn home">

</a>

</html>
