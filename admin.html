<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(#ececec,#f7f7f7);}
.login-box{background:white;padding:30px 25px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.15);width:320px;text-align:center;}
h2{margin-bottom:20px;color:#9c27b0;}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:15px;background:#9c27b0;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
button:hover{background:#7b1fa2;}
</style>
</head>
<body>

<div class="login-box">
<h2>Admin Login</h2>
<input type="text" id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>

<script>
function loginAdmin(){
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;

    // Simple check (replace with real backend later)
    if(user === "admin" && pass === "1234"){
        alert("Login Successful!");
        window.location.href = "index.html"; // redirect to Admin Dashboard
    }else{
        alert("Invalid Credentials");
    }
}
</script>

</body>
</html>
