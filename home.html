<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Meesho Home</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search{
flex:1;
}

.search input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.icons{
display:flex;
gap:12px;
font-size:22px;
}

.icons a{
text-decoration:none;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
transition:0.2s;
}

.product:hover{
transform:scale(1.03);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

.price{
font-weight:bold;
margin-top:5px;
color:#9c27b0;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="search">
<a href="search.html">
<input placeholder="Search products">
</a>
</div>

<div class="icons">

<a href="wishlist.html">❤️</a>
<a href="cart.html">🛒</a>
<a href="orders.html">📦</a>
<a href="profile.html">👤</a>

</div>

</div>

<!-- PRODUCTS -->

<div class="products">

<a href="product.html">
<div class="product">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<p>Sports Shoes</p>
<div class="price">₹799</div>
</div>
</a>

<a href="product.html">
<div class="product">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<p>Smart Watch</p>
<div class="price">₹1299</div>
</div>
</a>

<a href="product.html">
<div class="product">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<p>Stylish Handbag</p>
<div class="price">₹549</div>
</div>
</a>

<a href="product.html">
<div class="product">
<img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
<p>LED Table Lamp</p>
<div class="price">₹349</div>
</div>
</a>

<a href="product.html">
<div class="product">
<img src="https://images.unsplash.com/photo-1583225214464-9296029427aa">
<p>Casual T Shirt</p>
<div class="price">₹299</div>
</div>
</a>

<a href="product.html">
<div class="product">
<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">
<p>Wireless Headphones</p>
<div class="price">₹999</div>
</div>
</a>

</div>

</body>
</html>
