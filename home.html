<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Meesho Home</title>
<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}
/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.search{
  flex:1;
}
.search input{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
}
.icons{
  display:flex;
  gap:10px;
  font-size:20px;
}
.icons a{
  text-decoration:none;
}
/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.product{
  background:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
}
.product img{
  width:100%;
  border-radius:6px;
}
.price{
  font-weight:bold;
  margin-top:5px;
}
/* BOTTOM MENU */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
.bottom a{
  text-decoration:none;
  color:black;
  font-size:14px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="search">
    <input placeholder="Search products" onclick="window.location.href='search.html'">
  </div>
  <div class="icons">
    <a href="wishlist.html">❤️</a>
    <a href="cart.html">🛒</a>
    <a href="orders.html">📦</a>
    <a href="profile.html">👤</a>
  </div>
</div>

<!-- WELCOME -->
<div style="padding:10px;background:white;margin:10px;border-radius:8px;">
  <span id="welcomeUser">Welcome!</span>
</div>

<!-- PRODUCTS -->
<div class="products">
  <a href="product.html">
    <div class="product">
      <img src="https://i.imgur.com/YR6P6Qy.jpeg" alt="Supercar Poster">
      <p>Supercar Poster</p>
      <div class="price">₹258</div>
    </div>
  </a>

  <a href="product.html">
    <div class="product">
      <img src="https://i.imgur.com/9N5QZQx.jpeg" alt="Photo Frame">
      <p>Photo Frame</p>
      <div class="price">₹199</div>
    </div>
  </a>

  <a href="product.html">
    <div class="product">
      <img src="https://i.imgur.com/vvL2q5v.jpeg" alt="Wall Shelf">
      <p>Wall Shelf</p>
      <div class="price">₹499</div>
    </div>
  </a>

  <a href="product.html">
    <div class="product">
      <img src="https://i.imgur.com/1q9Z1Zm.jpeg" alt="LED Light">
      <p>LED Light</p>
      <div class="price">₹349</div>
    </div>
  </a>
</div>

<!-- BOTTOM MENU -->
<div class="bottom">
  <a href="home.html">Home</a>
  <a href="search.html">Search</a>
  <a href="cart.html">Cart</a>
  <a href="profile.html">Profile</a>
</div>

<script>
// Show logged-in user
let userName = localStorage.getItem("user_name");
if(userName){
  document.getElementById("welcomeUser").innerText = "Welcome, " + userName + "!";
}
</script>

</body>
</html>
