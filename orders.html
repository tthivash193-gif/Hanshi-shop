<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f7f7f7;}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:sticky;top:0;z-index:10;}
.header a{text-decoration:none;color:black;font-size:20px;}
.header .title{font-size:18px;font-weight:bold;}
.order-container{padding:15px;margin-top:8px;}
.order-item{background:white;margin-bottom:12px;padding:12px;display:flex;gap:12px;border-radius:8px;align-items:center;}
.order-item img{width:80px;height:80px;border-radius:8px;object-fit:cover;}
.order-info{flex:1;}
.order-info h4{font-size:16px;margin-bottom:4px;}
.order-info .price{font-weight:bold;margin-bottom:4px;}
.order-info .status{color:green;font-size:14px;}
</style>
</head>
<body>

<div class="header">
  <a href="profile.html">←</a>
  <div class="title">My Orders</div>
  <a href="cart.html">🛒</a>
</div>

<div class="order-container">
  <div class="order-item">
    <img src="https://i.imgur.com/YR6P6Qy.jpeg" alt="Supercar Poster">
    <div class="order-info">
      <h4>Supercar Wall Poster</h4>
      <div class="price">₹258</div>
      <div class="status">Delivered ✔</div>
    </div>
  </div>
  <div class="order-item">
    <img src="https://i.imgur.com/YW6XK7N.jpeg" alt="Bike Poster">
    <div class="order-info">
      <h4>Bike Wall Poster</h4>
      <div class="price">₹299</div>
      <div class="status">Shipped 🚚</div>
    </div>
  </div>
</div>

</body>
</html>
