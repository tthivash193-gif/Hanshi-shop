<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pro Max Product</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}
body{
  background:#f7f7f7;
}
/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:10;
}
.header a{
  text-decoration:none;
  color:black;
  font-size:20px;
}
.header .title{
  font-size:18px;
  font-weight:bold;
}
/* SWIPE IMAGES */
.swipe-container{
  position:relative;
  width:100%;
  overflow:hidden;
  background:white;
}
.swipe-container img{
  width:100%;
  display:block;
  transition:transform 0.3s ease;
}
.swipe-buttons{
  position:absolute;
  top:50%;
  width:100%;
  display:flex;
  justify-content:space-between;
  transform:translateY(-50%);
  padding:0 10px;
}
.swipe-buttons span{
  background:rgba(0,0,0,0.3);
  color:white;
  font-size:24px;
  padding:8px 12px;
  border-radius:50%;
  cursor:pointer;
}

/* PRODUCT DETAILS */
.details{
  background:white;
  margin-top:8px;
  padding:15px;
}
.details .price{
  font-size:22px;
  font-weight:bold;
}
.details .old{
  text-decoration:line-through;
  color:gray;
  margin-left:6px;
}
.details .off{
  color:green;
  margin-left:6px;
}
.details .title{
  font-size:16px;
  margin-top:8px;
}
.details .rating{
  color:#ff9800;
  margin-top:6px;
}

/* RELATED PRODUCTS */
.related-section{
  background:white;
  margin-top:10px;
  padding:15px;
}
.related-section h3{
  margin-bottom:12px;
}
.related{
  display:flex;
  gap:10px;
  overflow-x:auto;
}
.related a{
  min-width:120px;
  background:white;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  text-align:center;
  flex-shrink:0;
  text-decoration:none;
  color:black;
}
.related img{
  width:100%;
  border-radius:10px 10px 0 0;
}
.related p{
  font-size:14px;
  padding:5px;
}

/* BUTTONS */
.buttons{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}
.buttons a{
  flex:1;
  padding:14px;
  text-align:center;
  font-weight:bold;
  color:white;
  text-decoration:none;
}
.add-cart{
  background:#ff9800;
}
.buy-now{
  background:#9c27b0;
}
.space{
  height:70px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="home.html">←</a>
  <div class="title">Product</div>
  <a href="cart.html">🛒</a>
</div>

<!-- SWIPE IMAGES -->
<div class="swipe-container">
  <img src="https://i.imgur.com/YR6P6Qy.jpeg" id="productImage">
  <div class="swipe-buttons">
    <span id="prev">‹</span>
    <span id="next">›</span>
  </div>
</div>

<!-- PRODUCT DETAILS -->
<div class="details">
  <div class="price">
    ₹258 <span class="old">₹314</span> <span class="off">18% off</span>
  </div>
  <div class="title">Supercar Wall Poster for Room Decoration</div>
  <div class="rating">⭐⭐⭐⭐☆ (245 Reviews)</div>
</div>

<!-- RELATED PRODUCTS -->
<div class="related-section">
  <h3>Similar Products</h3>
  <div class="related">
    <a href="product.html">
      <img src="https://i.imgur.com/YR6P6Qy.jpeg">
      <p>Gaming Poster ₹199</p>
    </a>
    <a href="product.html">
      <img src="https://i.imgur.com/YR6P6Qy.jpeg">
      <p>Bike Poster ₹299</p>
    </a>
    <a href="product.html">
      <img src="https://i.imgur.com/YR6P6Qy.jpeg">
      <p>Car Poster ₹258</p>
    </a>
  </div>
</div>

<div class="space"></div>

<!-- BUTTONS -->
<div class="buttons">
  <a href="cart.html" class="add-cart">Add to Cart</a>
  <a href="review.html" class="buy-now">Buy Now</a>
</div>

<script>
// Swipe Images JS
let images = [
  "https://i.imgur.com/YR6P6Qy.jpeg",
  "https://i.imgur.com/YW6XK7N.jpeg",
  "https://i.imgur.com/7F8Qk8q.jpeg"
];
let index = 0;
const productImage = document.getElementById("productImage");
document.getElementById("prev").addEventListener("click", ()=>{
  index = (index-1 + images.length)%images.length;
  productImage.src = images[index];
});
document.getElementById("next").addEventListener("click", ()=>{
  index = (index+1)%images.length;
  productImage.src = images[index];
});
</script>

</body>
</html>
