<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Details</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:20px;
}

a{
text-decoration:none;
color:black;
}

/* PRODUCT */

.product{
padding:10px;
}

.product img{
width:100%;
border-radius:8px;
}

.name{
font-size:18px;
margin-top:10px;
}

.price{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

.desc{
margin-top:10px;
color:#555;
}

/* BUTTONS */

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.cart{
background:#ff9800;
color:white;
}

.buy{
background:#9c27b0;
color:white;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<a href="home.html">⬅</a>

<div>Product</div>

<a href="wishlist.html">❤️</a>

</div>

<!-- PRODUCT -->

<div class="product">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

<div class="name">
Supercar Wall Poster
</div>

<div class="price">
₹258
</div>

<div class="desc">
High quality supercar wall poster. Perfect for room decoration.
</div>

<div class="buttons">

<button class="cart" onclick="addCart()">
Add to Cart
</button>

<button class="buy" onclick="buyNow()">
Buy Now
</button>

</div>

</div>

<script>

function addCart(){

alert("Added to cart")

window.location="cart.html"

}

function buyNow(){

window.location="cart.html"

}

</script>

</body>

</html>
