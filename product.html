<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f1f3f6;
}

/* HEADER */

.header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:sticky;
top:0;
}

.left{
display:flex;
gap:12px;
font-size:22px;
}

.right{
display:flex;
gap:15px;
font-size:20px;
}

a{
text-decoration:none;
color:black;
}

/* PRODUCT IMAGE */

.product-img{
background:white;
}

.product-img img{
width:100%;
}

/* DETAILS */

.details{
background:white;
padding:15px;
margin-top:8px;
}

.price{
font-size:24px;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:6px;
}

.off{
color:green;
margin-left:6px;
}

.title{
margin-top:10px;
font-size:16px;
}

.rating{
margin-top:6px;
color:#ff9800;
}

/* QUANTITY */

.qty-box{
margin-top:10px;
display:flex;
gap:10px;
align-items:center;
}

.qty-box button{
padding:6px 12px;
font-size:16px;
border:none;
background:#eee;
border-radius:4px;
cursor:pointer;
}

/* SECTION */

.section{
background:white;
padding:15px;
margin-top:8px;
}

/* RELATED */

.related{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.related a{
text-decoration:none;
color:black;
}

.related img{
width:100%;
border-radius:8px;
}

.related p{
font-size:14px;
}

/* BUTTONS */

.buttons{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

.cart{
flex:1;
padding:14px;
background:#ff9800;
color:white;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.buy{
flex:1;
padding:14px;
background:#9c27b0;
color:white;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.space{
height:70px;
}

.wishlist{
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="left">

<a href="home.html">←</a>

</div>

<div class="right">

<span class="wishlist" onclick="addWishlist()">❤️</span>

<a href="cart.html">🛒</a>

</div>

</div>

<!-- PRODUCT IMAGE -->

<div class="product-img">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

</div>

<!-- DETAILS -->

<div class="details">

<div class="price">

₹258

<span class="old">₹314</span>

<span class="off">18% off</span>

</div>

<div class="title">

Supercar Wall Poster for Room Decoration

</div>

<div class="rating">

⭐⭐⭐⭐☆ (245 Reviews)

</div>

<!-- QUANTITY -->

<div class="qty-box">

<button onclick="minus()">-</button>

<span id="qty">1</span>

<button onclick="plus()">+</button>

</div>

</div>

<!-- DESCRIPTION -->

<div class="section">

<h3>Product Details</h3>

<p>

High quality wall poster perfect for room decoration.
Premium print quality with long lasting colors.

</p>

</div>

<!-- RELATED PRODUCTS -->

<div class="section">

<h3>Similar Products</h3>

<div class="related">

<a href="product.html">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

<p>Gaming Poster ₹199</p>

</a>

<a href="product.html">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

<p>Bike Poster ₹299</p>

</a>

</div>

</div>

<div class="space"></div>

<!-- BUTTONS -->

<div class="buttons">

<div class="cart" onclick="addCart()">

Add to Cart

</div>

<div class="buy" onclick="buyNow()">

Buy Now

</div>

</div>

<script>

let quantity = 1

function plus(){

quantity++

document.getElementById("qty").innerText = quantity

}

function minus(){

if(quantity>1){

quantity--

document.getElementById("qty").innerText = quantity

}

}

function addCart(){

alert("Product Added to Cart 🛒")

window.location="cart.html"

}

function buyNow(){

window.location="review.html"

}

function addWishlist(){

alert("Added to Wishlist ❤️")

}

</script>

</body>

</html>
