<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help & Support</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f7f7f7;}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:sticky;top:0;z-index:10;}
.header a{text-decoration:none;color:black;font-size:20px;}
.header .title{font-size:18px;font-weight:bold;}
.help-container{padding:15px;margin-top:8px;}
.help-item{background:white;margin-bottom:12px;padding:15px;border-radius:8px;cursor:pointer;border-left:4px solid #4CAF50;}
.help-item h4{font-size:16px;color:#333;}
.help-item p{color:gray;font-size:14px;margin-top:4px;display:none;}
.help-item.active p{display:block;}
</style>
<script>
function toggleHelp(el){el.classList.toggle('active');}
</script>
</head>
<body>

<div class="header">
  <a href="profile.html">←</a>
  <div class="title">Help & Support</div>
  <a href="cart.html">🛒</a>
</div>

<div class="help-container">
  <div class="help-item" onclick="toggleHelp(this)">
    <h4>How to track my order?</h4>
    <p>Go to 'My Orders' page, select your order, click 'Track'.</p>
  </div>
  <div class="help-item" onclick="toggleHelp(this)">
    <h4>How to cancel an order?</h4>
    <p>You can cancel within 24 hours of placing the order from 'My Orders'.</p>
  </div>
  <div class="help-item" onclick="toggleHelp(this)">
    <h4>Payment issues?</h4>
    <p>Contact your bank or try another payment method in the checkout page.</p>
  </div>
</div>

</body>
</html>
