<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Profile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:linear-gradient(#f7f7f7,#ececec);}
a{text-decoration:none;color:black;}

/* HEADER */
.header{
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.title{font-size:18px;font-weight:bold;}

/* PROFILE BOX */
.profile-box{
  background:white;
  margin:10px;
  padding:25px;
  border-radius:10px;
  text-align:center;
}
.avatar{font-size:55px;}
.name{margin-top:10px;font-size:18px;font-weight:bold;}
.phone{color:gray;font-size:14px;}

/* MENU */
.menu{
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
}
.item{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #eee;
  font-size:16px;
}
.item:last-child{border-bottom:none;}
</style>
</head>
<body>

<div class="header">
  <a href="home.html">←</a>
  <div class="title">My Profile</div>
  <a href="cart.html">🛒</a>
</div>

<div class="profile-box">
  <div class="avatar">👤</div>
  <div class="name">Thivash</div>
  <div class="phone">+91 9876543210</div>
</div>

<div class="menu">
  <a href="orders.html">
    <div class="item">
      <span>📦 My Orders</span>
      <span>→</span>
    </div>
  </a>
  <a href="wishlist.html">
    <div class="item">
      <span>❤️ Wishlist</span>
      <span>→</span>
    </div>
  </a>
  <a href="cart.html">
    <div class="item">
      <span>🛒 My Cart</span>
      <span>→</span>
    </div>
  </a>
  <a href="address.html">
    <div class="item">
      <span>📍 My Address</span>
      <span>→</span>
    </div>
  </a>
  <a href="help.html">
    <div class="item">
      <span>❓ Help & Support</span>
      <span>→</span>
    </div>
  </a>
  <a href="logout.html">
    <div class="item">
      <span>🚪 Logout</span>
      <span>→</span>
    </div>
  </a>
</div>

</body>
</html>
