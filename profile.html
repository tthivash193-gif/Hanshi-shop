<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:20px;
}

a{
text-decoration:none;
color:black;
}

/* PROFILE BOX */

.profile{
background:white;
margin:10px;
padding:20px;
border-radius:8px;
text-align:center;
}

.profile img{
width:80px;
border-radius:50%;
margin-bottom:10px;
}

/* MENU */

.menu{
background:white;
margin:10px;
border-radius:8px;
}

.menu a{
display:block;
padding:12px;
border-bottom:1px solid #eee;
color:black;
}

.menu a:last-child{
border-bottom:none;
}

.logout{
color:red;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<div class="header">

<a href="home.html">⬅</a>

<div>Profile</div>

<a href="cart.html">🛒</a>

</div>

<!-- PROFILE -->

<div class="profile">

<img src="https://i.imgur.com/2DhmtJ4.png">

<h3 id="userEmail">User</h3>

</div>

<!-- MENU -->

<div class="menu">

<a href="orders.html">📦 My Orders</a>

<a href="cart.html">🛒 My Cart</a>

<a href="wishlist.html">❤️ Wishlist</a>

<a href="home.html">🏠 Home</a>

<div class="logout" onclick="logout()">
Logout
</div>

</div>

<script>

let email=localStorage.getItem("userEmail")

if(email){
document.getElementById("userEmail").innerText=email
}

function logout(){

localStorage.clear()

window.location="index.html"

}

</script>

</body>

</html>
