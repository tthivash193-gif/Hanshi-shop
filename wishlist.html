<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wishlist</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:20px;
}

a{
text-decoration:none;
color:black;
}

/* PRODUCT CARD */

.card{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
display:flex;
gap:10px;
}

.card img{
width:80px;
border-radius:6px;
}

.info{
flex:1;
}

.price{
font-weight:bold;
margin-top:5px;
}

/* BUTTONS */

.btn{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:6px;
margin-right:5px;
}

.cart{
background:#9c27b0;
color:white;
}

.remove{
background:red;
color:white;
}

.empty{
text-align:center;
margin-top:50px;
font-size:18px;
}

</style>

</head>

<body>

<div class="header">

<a href="home.html">⬅</a>

<div>Wishlist</div>

<a href="cart.html">🛒</a>

</div>

<div id="wishlistBox"></div>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || []

function showWishlist(){

let box=document.getElementById("wishlistBox")

if(wishlist.length==0){
box.innerHTML="<div class='empty'>No Wishlist Items</div>"
return
}

box.innerHTML=""

wishlist.forEach((p,index)=>{

box.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="info">

<p>${p.name}</p>

<div class="price">₹${p.price}</div>

<button class="btn cart" onclick="addCart(${index})">
Add to Cart
</button>

<button class="btn remove" onclick="removeWish(${index})">
Remove
</button>

</div>

</div>

`

})

}

function removeWish(i){

wishlist.splice(i,1)

localStorage.setItem("wishlist",JSON.stringify(wishlist))

showWishlist()

}

function addCart(i){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push(wishlist[i])

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to Cart")

}

showWishlist()

</script>

</body>

</html>
