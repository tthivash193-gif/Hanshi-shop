<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pro Max Cart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f7f7f7;}
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 15px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;top:0;z-index:10;
}
.header a{text-decoration:none;color:black;font-size:20px;}
.header .title{font-size:18px;font-weight:bold;}
.cart-container{padding:15px;margin-top:8px;background:white;}
.cart-item{
  display:flex;align-items:center;margin-bottom:12px;border-bottom:1px solid #ddd;padding-bottom:12px;
}
.cart-item img{width:80px;height:80px;border-radius:8px;margin-right:12px;object-fit:cover;}
.item-info{flex:1;}
.item-info h4{font-size:16px;margin-bottom:4px;}
.item-info p{font-size:14px;color:gray;}
.qty{display:flex;align-items:center;gap:6px;margin-top:6px;}
.qty button{
  padding:2px 8px;border:none;background:#ddd;border-radius:4px;font-size:16px;cursor:pointer;
}
.remove{background:#ff4d4d;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;margin-top:6px;}
.total-section{background:white;padding:15px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:bold;}
.checkout-btn{width:100%;padding:14px;background:#9c27b0;color:white;text-align:center;text-decoration:none;font-weight:bold;display:block;margin-top:10px;border-radius:6px;}
</style>
</head>
<body>

<div class="header">
  <a href="home.html">←</a>
  <div class="title">My Cart</div>
  <a href="wishlist.html">❤️</a>
</div>

<div class="cart-container" id="cartContainer">
  <!-- Cart items will be injected here by JS -->
</div>

<div class="total-section">
  <span>Total:</span>
  <span id="totalPrice">₹0</span>
</div>

<a href="address.html" class="checkout-btn">Checkout</a>

<script>
// Sample Cart Data
let cartItems = [
  {id:1,name:"Supercar Wall Poster",price:258,qty:1,img:"https://i.imgur.com/YR6P6Qy.jpeg"},
  {id:2,name:"Bike Poster",price:299,qty:2,img:"https://i.imgur.com/YW6XK7N.jpeg"}
];

const cartContainer = document.getElementById("cartContainer");
const totalPrice = document.getElementById("totalPrice");

function renderCart(){
  cartContainer.innerHTML="";
  let total=0;
  cartItems.forEach(item=>{
    total += item.price * item.qty;
    let div = document.createElement("div");
    div.className="cart-item";
    div.innerHTML=`
      <img src="${item.img}">
      <div class="item-info">
        <h4>${item.name}</h4>
        <p>₹${item.price}</p>
        <div class="qty">
          <button onclick="changeQty(${item.id},-1)">-</button>
          <span id="qty${item.id}">${item.qty}</span>
          <button onclick="changeQty(${item.id},1)">+</button>
        </div>
        <button class="remove" onclick="removeItem(${item.id})">Remove</button>
      </div>
    `;
    cartContainer.appendChild(div);
  });
  totalPrice.innerText = "₹"+total;
}

function changeQty(id,delta){
  cartItems = cartItems.map(item=>{
    if(item.id===id){
      item.qty += delta;
      if(item.qty<1) item.qty=1;
    }
    return item;
  });
  renderCart();
}

function removeItem(id){
  cartItems = cartItems.filter(item=>item.id!==id);
  renderCart();
}

renderCart();
</script>

</body>
</html>
