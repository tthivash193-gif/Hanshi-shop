<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Cart</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:20px;
}

a{
text-decoration:none;
color:black;
}

.cart-box{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
display:flex;
gap:10px;
}

.cart-box img{
width:90px;
border-radius:6px;
}

.info{
flex:1;
}

.price{
font-weight:bold;
margin-top:5px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
}

.qty button{
padding:4px 10px;
font-size:16px;
border:none;
background:#eee;
border-radius:4px;
cursor:pointer;
}

.remove{
color:red;
font-size:13px;
margin-top:6px;
cursor:pointer;
}

/* SUMMARY */

.summary{
background:white;
margin:10px;
padding:15px;
border-radius:8px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-weight:bold;
font-size:18px;
}

/* CHECKOUT */

.checkout{
position:fixed;
bottom:0;
width:100%;
background:#9c27b0;
color:white;
text-align:center;
padding:14px;
font-weight:bold;
}

.space{
height:70px;
}

</style>

</head>

<body>

<div class="header">

<a href="home.html">⬅</a>

<div>My Cart</div>

<a href="orders.html">📦</a>

</div>

<!-- CART PRODUCT -->

<div class="cart-box" id="item">

<img src="https://i.imgur.com/YR6P6Qy.jpeg">

<div class="info">

<p>Supercar Wall Poster</p>

<div class="price">
₹<span id="price">258</span>
</div>

<div class="qty">

<button onclick="minus()">−</button>

<span id="qty">1</span>

<button onclick="plus()">+</button>

</div>

<div class="remove" onclick="removeItem()">
Remove
</div>

</div>

</div>

<!-- SUMMARY -->

<div class="summary">

<div class="row">
<span>Item Total</span>
<span>₹<span id="itemTotal">258</span></span>
</div>

<div class="row">
<span>Delivery</span>
<span>₹40</span>
</div>

<div class="row total">
<span>Total</span>
<span>₹<span id="grandTotal">298</span></span>
</div>

</div>

<div class="space"></div>

<a href="checkout.html">

<div class="checkout">
Proceed to Checkout
</div>

</a>

<script>

let quantity=1
let price=258
let delivery=40

function updatePrice(){

let itemTotal=price*quantity
let total=itemTotal+delivery

document.getElementById("qty").innerText=quantity
document.getElementById("itemTotal").innerText=itemTotal
document.getElementById("grandTotal").innerText=total

}

function plus(){
quantity++
updatePrice()
}

function minus(){
if(quantity>1){
quantity--
updatePrice()
}
}

function removeItem(){

document.getElementById("item").style.display="none"

document.getElementById("itemTotal").innerText="0"
document.getElementById("grandTotal").innerText="0"

}

</script>

</body>

</html>
